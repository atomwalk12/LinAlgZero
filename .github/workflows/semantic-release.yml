# Check the docs for more information:
# https://python-semantic-release.readthedocs.io/en/latest/automatic-releases/github-actions.html#examples
# To test locally: semantic-release -vv --noop version --print
name: Release

on:
  workflow_dispatch:
  # This is disabled to be able to roll multiple breaking releases into one release
  # push:
  #   branches:
  #     - main

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup | Force release branch to be at workflow sha
        run: |
          git reset --hard ${{ github.sha }}

      - name: Action | Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9.21.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # The following is done through the on-release-main.yml action.
      # Leaving this here for reference.
      # - name: Publish | Upload package to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   # NOTE: DO NOT wrap the conditional in ${{ }} as it will always evaluate to true.
      #   # See https://github.com/actions/runner/issues/1173
      #   if: steps.release.outputs.released == 'true'

      - name: Publish | Upload to GitHub Release Assets
        uses: python-semantic-release/publish-action@v9.21.1
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}
